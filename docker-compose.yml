services:
  api:
    build: api
    ports:
      - "3000:3000"
    env_file:
      - api/.env
    depends_on:
      postgres:
        condition: service_healthy
      db:
        condition: service_started
    restart: on-failure

  db:
    build: db
    ports:
      - "6379:6379"
    volumes:
      - .data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener123
      POSTGRES_DB: shortenerdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener -d shortenerdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: